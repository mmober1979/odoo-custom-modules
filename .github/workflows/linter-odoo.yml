name: Verificació d'Estil Odoo (Python)

# Aquest flux de treball s'executarà cada vegada que faces un 'push' o un 'pull request' a la branca principal
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  lint:
    name: Comprovar codi amb Flake8
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Descarregar el codi del repositori
      uses: actions/checkout@v4

    - name: 🐍 Configurar l'entorn Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # Versió recomanada per a Odoo 16/17

    - name: 📦 Instal·lar dependències (Flake8)
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    - name: 🔍 Executar verificació d'estil
      run: |
        # Atura l'acció si hi ha errors de sintaxi greus o variables no definides
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        
        # Comprovacions d'estil PEP 8 generals (advertències, no fallen l'execució)
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics